[build]
builder = "NIXPACKS"

[deploy]
# Nixpacks' default startCommand is `npm start`, which Docusaurus maps to
# `docusaurus start` (the dev server). In production we want to serve the
# pre-built static output from ./build, binding to 0.0.0.0 so Railway's
# router can reach it.
startCommand = "npx docusaurus serve --host 0.0.0.0 --port $PORT --no-open"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
